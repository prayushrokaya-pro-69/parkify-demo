{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">

<header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-200/70">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between gap-3">
    <a href="{% url 'home' %}" class="text-lg sm:text-xl font-extrabold tracking-tight truncate">Parkify</a>
    <a href="{% url 'logout' %}" class="inline-flex items-center gap-1.5 text-sm font-medium text-red-600 hover:text-red-700 transition">Logout</a>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 sm:px-6 py-10 sm:py-16">
  {% if messages %}
  <div class="space-y-2 mb-6">
    {% for message in messages %}
    <div class="rounded-xl border px-4 py-3 text-sm font-medium {% if message.tags == 'error' %}bg-red-50 text-red-700 border-red-200{% else %}bg-emerald-50 text-emerald-700 border-emerald-200{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="mb-6">
    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Change Password</h1>
    <p class="mt-1 text-slate-500">Update your account password securely.</p>
  </div>

  <div class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 p-5 sm:p-8">
    <form method="POST" action="{% url 'change_password' %}" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">Current Password</label>
        <input type="password" name="current_password" required autofocus class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">New Password</label>
        <input type="password" name="new_password" required minlength="8" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400 transition">
        <p class="mt-1 text-xs text-slate-400">Must be at least 8 characters.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">Confirm Password</label>
        <input type="password" name="confirm_password" required minlength="8" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400 transition">
      </div>
      <div class="flex flex-col sm:flex-row gap-3 pt-1">
        <button type="submit" class="inline-flex items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-xl font-medium transition">Save Password</button>
        <a href="{% url 'dashboard' %}" class="inline-flex items-center justify-center border border-slate-200 bg-white hover:bg-slate-50 px-5 py-3 rounded-xl font-medium transition">Cancel</a>
      </div>
    </form>
  </div>
</main>

<script>lucide.createIcons();</script>
</body>
</html>
