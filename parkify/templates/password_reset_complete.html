{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Complete | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-8 text-center">
  <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
    <i data-lucide="check" class="w-8 h-8"></i>
  </div>
  <h1 class="text-2xl font-bold mb-2">Password Reset Complete</h1>
  <p class="text-slate-500 mb-6">Your password has been updated. You can now log in with your new password.</p>
  <a href="{% url 'authentication' %}" class="inline-block bg-slate-900 hover:bg-emerald-600 transition text-white px-6 py-3 rounded-xl font-medium">Go to Login</a>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
