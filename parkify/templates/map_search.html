<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Search | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .price-pin { background: white; padding: 4px 8px; border-radius: 999px; border: 1px solid #e2e8f0; font-weight: 600; font-size: 12px; color: #0f172a; box-shadow: 0 1px 0 rgba(0,0,0,0.05); }
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<header class="h-16 bg-white/90 backdrop-blur border-b border-slate-200 flex items-center px-4">
  <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
    <a href="/browse-parking/" class="text-xl font-bold text-slate-900">Parkify</a>
    <div class="flex items-center gap-3">
      <a href="/browse-parking/" class="text-sm font-medium text-slate-600 hover:text-slate-900 hidden sm:block">Browse</a>

      <a href="/authentication/" class="text-sm font-medium text-slate-600 hover:text-slate-900 hidden sm:block">Login</a>

    </div>
  </div>
</header>
<main class="max-w-7xl mx-auto">

  <div id="map" style="height: calc(100dvh - 64px);"></div>
</main>

<!--
  IMPORTANT: this replaces the old "const sites = {{ sites }};" line.
  {{ sites }} on its own renders Python's str()/repr() of the list
  (single quotes, None, etc.) which is NOT valid JavaScript and crashes
  the whole <script> block silently.

  json_script safely serializes the Python list to real JSON and escapes
  anything that could break out of the <script> tag. In your view, just
  pass `sites` as a normal list of dicts in the context - no manual
  json.dumps() needed, Django's filter handles it.
-->
{{ sites|json_script:"sites-data" }}

<script>
  const sites = JSON.parse(document.getElementById('sites-data').textContent);

  if (!sites || !sites.length) {
    document.getElementById('map').insertAdjacentHTML('afterbegin', `<div class="flex h-full items-center justify-center text-slate-500">No parking spots found for map view.</div>`);
  } else {
    const map = L.map('map').setView([27.7172, 85.324], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);
    const markers = [];
    sites.forEach((site) => {
      if (!site.lat || !site.lng) return;
      const el = document.createElement('div');
      el.className = 'price-pin';
      el.textContent = 'Rs ' + Math.round(site.rate_per_hour || 0) + '/hr';
      const icon = L.divIcon({ html: el.outerHTML, className: '', iconSize: [80, 28], iconAnchor: [40, 14] });
      const m = L.marker([site.lat, site.lng], { icon }).addTo(map);
      const detailUrl = "/parking/0/".replace('/0/', '/' + site.id + '/');
      m.bindPopup(`<strong>${site.name}</strong><br>${site.location}<br><a class='underline text-emerald-700' href='${detailUrl}'>View details</a>`);
      markers.push(m);
    });
    if (markers.length) {
      const group = new L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
    } else {
      document.getElementById('map').insertAdjacentHTML('beforeend', `<div class="absolute top-4 left-4 bg-white px-3 py-2 rounded shadow text-sm text-slate-600">Some spots are missing coordinates and aren't shown on the map.</div>`);
    }
  }
</script>
<script>lucide.createIcons();</script>
</body>
</html>
