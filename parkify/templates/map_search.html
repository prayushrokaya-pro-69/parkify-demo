{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Search | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .price-pin { background: white; padding: 4px 8px; border-radius: 999px; border: 1px solid #e2e8f0; font-weight: 600; font-size: 12px; color: #0f172a; box-shadow: 0 1px 0 rgba(0,0,0,0.05); }
</style>
</head>
<body class="bg-slate-100 text-slate-900">

<header class="h-16 bg-white/90 backdrop-blur border-b border-slate-200 flex items-center px-4">
  <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
    <a href="{% url 'browse_parking' %}" class="text-xl font-bold text-slate-900">Parkify</a>
    <div class="flex items-center gap-3">
      <a href="{% url 'authentication' %}" class="text-sm font-medium text-slate-600 hover:text-slate-900 hidden sm:block">Login</a>
      <a href="{% url 'my_bookings' %}" class="text-sm font-medium text-slate-600 hover:text-slate-900 hidden sm:block">My Bookings</a>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto">
  {% if messages %}
  <div class="space-y-2 mb-6">
    {% for message in messages %}
    <div class="rounded-xl border px-4 py-3 text-sm font-medium {% if message.tags == 'error' %}bg-red-50 text-red-700 border-red-200{% else %}bg-emerald-50 text-emerald-700 border-emerald-200{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <div id="map" style="height: calc(100dvh - 64px);"></div>
</main>

<script>
  const sites = {{ sites|safe }};
  if (!sites || !sites.length) {
    document.getElementById('map').insertAdjacentHTML('afterbegin', `<div class="flex h-full items-center justify-center text-slate-500">No parking spots found for map view.</div>`);
  } else {
    const map = L.map('map').setView([27.7172, 85.324], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    const markers = [];
    sites.forEach((site) => {
      if (!site.lat || !site.lng) return;
      const el = document.createElement('div');
      el.className = 'price-pin';
      el.textContent = 'Rs ' + Math.round(site.rate_per_hour || 0) + '/hr';
      const icon = L.divIcon({ html: el.outerHTML, className: '', iconSize: [80, 28], iconAnchor: [40, 14] });
      const m = L.marker([site.lat, site.lng], { icon }).addTo(map);
      const detailUrl = "{% url 'view_parking' 0 %}".replace('/0/', '/' + site.id + '/');
m.bindPopup(`<strong>${site.name}</strong><br>${site.location}<br><a class='underline text-emerald-700' href='${detailUrl}'>View details</a>`);
      markers.push(m);
    });

    if (markers.length) {
      const group = new L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
    }
  }
</script>
<script>lucide.createIcons();</script>
</body>
</html>
