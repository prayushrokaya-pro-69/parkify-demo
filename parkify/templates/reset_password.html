{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set a New Password | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-8">
  <h1 class="text-2xl font-bold text-center mb-2">Set a New Password</h1>
  <p class="text-slate-500 text-center mb-6">Choose a new password for your Parkify account.</p>
  {% if messages %}
  <div class="mb-6 space-y-2">
    {% for message in messages %}
    <div class="px-4 py-3 rounded-xl {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-emerald-100 text-emerald-700{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <form method="POST" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-slate-600 mb-1">New Password</label>
      <input type="password" name="new_password" required minlength="8" class="w-full rounded-xl border border-slate-200 px-4 py-3">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-600 mb-1">Confirm New Password</label>
      <input type="password" name="confirm_password" required minlength="8" class="w-full rounded-xl border border-slate-200 px-4 py-3">
    </div>
    <p class="text-xs text-slate-400">Must be at least 8 characters.</p>
    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-medium transition">Reset Password</button>
  </form>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
