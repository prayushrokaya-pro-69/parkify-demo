{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-lg bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-8 text-center">
  <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-xl bg-emerald-100 text-emerald-700">
    <i data-lucide="party-popper" class="w-7 h-7"></i>
  </div>
  <h1 class="mt-4 text-2xl font-bold">Welcome, {{ username|default:"User" }}!</h1>
  <p class="mt-2 text-slate-500">Your account is ready. Start by finding parking or managing your bookings.</p>
  <div class="mt-6 grid sm:grid-cols-2 gap-3">
    <a href="{% url 'browse_parking' %}" class="inline-flex items-center justify-center gap-2 bg-slate-900 hover:bg-emerald-600 transition text-white py-3 rounded-xl font-medium">
      <i data-lucide="search" class="w-4 h-4"></i> Find Parking
    </a>
    <a href="{% url 'my_bookings' %}" class="inline-flex items-center justify-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 transition py-3 rounded-xl font-medium">
      <i data-lucide="calendar" class="w-4 h-4"></i> My Bookings
    </a>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
