{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Parkify</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-8">
  <div class="text-center">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-xl bg-red-50 text-red-600">
      <i data-lucide="key-round" class="w-7 h-7"></i>
    </div>
    <h1 class="mt-4 text-2xl font-bold">Reset Password</h1>
    <p class="mt-1.5 text-slate-500 text-sm">Enter your registered email and we'll send you a reset link.</p>
  </div>

  {% if messages %}
  <div class="mt-6 space-y-2">
    {% for message in messages %}
    <div class="px-4 py-3 rounded-xl {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-emerald-100 text-emerald-700{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="POST" action="{% url 'forgot_password' %}" class="mt-6 space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-slate-600 mb-1">Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required class="w-full rounded-xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition">
    </div>
    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-medium transition">Send Reset Link</button>
  </form>

  <div class="mt-6 text-center text-sm">
    <a href="{% url 'authentication' %}" class="text-slate-600 hover:text-emerald-600 transition">← Back to login</a>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
